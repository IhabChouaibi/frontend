<article class="candidate-card">
  <div>
    <h3>{{ candidate.firstName }} {{ candidate.lastName }}</h3>
    <p>{{ candidate.email }}</p>
    <p>{{ candidate.currentPosition || 'Candidate' }}</p>
  </div>

  <div class="candidate-card__meta">
    <span>{{ candidate.phone || '-' }}</span>
    <span>{{ candidate.yearsOfExperience || 0 }} years</span>
    <app-button variant="secondary" (click)="downloadCv()">Download CV</app-button>
  </div>
</article>
