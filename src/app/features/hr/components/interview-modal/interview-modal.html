<app-modal [visible]="visible" title="Schedule interview" (close)="close.emit()">
  <form [formGroup]="form" (ngSubmit)="submit()" class="interview-form">
    <app-form-input label="Interview date" type="datetime-local" formControlName="date"></app-form-input>
    <app-form-input label="Interview type" formControlName="type" placeholder="Video interview"></app-form-input>

    <app-button type="submit" [loading]="loading">Schedule</app-button>
  </form>
</app-modal>
