<app-modal [visible]="visible" title="Schedule interview" (close)="close.emit()">
  <form [formGroup]="form" (ngSubmit)="submit()" class="interview-form">
    <app-form-input label="Application ID" type="number" formControlName="applicationId"></app-form-input>
    <app-form-input label="Interviewer ID" type="number" formControlName="interviewerId"></app-form-input>
    <app-form-input label="Interview date" type="datetime-local" formControlName="interviewDate"></app-form-input>
    <app-form-input label="Interview type" formControlName="type" placeholder="Video interview"></app-form-input>

    <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

    <app-button type="submit" [loading]="loading" [disabled]="form.invalid">Schedule</app-button>
  </form>
</app-modal>
