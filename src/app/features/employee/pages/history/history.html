<section class="page-shell">
  <div class="page-hero">
    <div class="page-hero__content">
      <span class="eyebrow">Leave history</span>
      <h1 class="page-title">Suivre l historique complet de vos demandes de conge.</h1>
      <p class="page-copy">
        Filtrez rapidement vos demandes et consultez leur statut actuel en un coup d oeil.
      </p>
    </div>

    <div class="surface-card history-side">
      <strong>{{ leaves.length }}</strong>
      <p>Demandes chargees sur la page courante.</p>
    </div>
  </div>

  <input
    type="search"
    class="search-input"
    [formControl]="searchControl"
    placeholder="Search your leave history"
  />

  <app-loader *ngIf="loading"></app-loader>
  <div *ngIf="error" class="error-message">{{ error }}</div>

  <article class="surface-card">
    <app-history-table [leaves]="leaves"></app-history-table>
  </article>

  <div class="table-footer" *ngIf="totalPages > 0">
    <span>Page {{ page + 1 }} / {{ totalPages }}</span>
    <div class="pagination-controls">
      <app-button variant="ghost" (click)="changePage(-1)" [disabled]="page === 0">Previous</app-button>
      <app-button variant="secondary" (click)="changePage(1)" [disabled]="page + 1 >= totalPages">Next</app-button>
    </div>
  </div>
</section>
