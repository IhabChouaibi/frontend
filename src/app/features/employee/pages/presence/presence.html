<section class="page-shell">
  <div class="page-hero">
    <div class="page-hero__content">
      <span class="eyebrow">Presence</span>
      <h1 class="page-title">Pointer, suivre l historique et verifier vos statuts de presence.</h1>
      <p class="page-copy">
        Les actions de check-in et check-out sont reliees au service de presence existant.
      </p>
    </div>

    <div class="hero-actions">
      <app-button (click)="checkIn()" [loading]="loading">Check In</app-button>
      <app-button variant="secondary" (click)="checkOut()" [loading]="loading">Check Out</app-button>
    </div>
  </div>

  <div *ngIf="message" class="success-message">{{ message }}</div>
  <div *ngIf="error" class="error-message">{{ error }}</div>

  <div class="cards-grid">
    <app-presence-card *ngFor="let item of presences" [presence]="item"></app-presence-card>
  </div>

  <div class="table-footer" *ngIf="totalPages > 0">
    <span>Page {{ page + 1 }} / {{ totalPages }}</span>
    <div class="pagination-controls">
      <app-button variant="ghost" (click)="changePage(-1)" [disabled]="page === 0">Previous</app-button>
      <app-button variant="secondary" (click)="changePage(1)" [disabled]="page + 1 >= totalPages">Next</app-button>
    </div>
  </div>
</section>
