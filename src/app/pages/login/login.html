<div class="login-container">
  <div class="login-card">
    <h2 class="login-title">HRMS Login</h2>

   <form [formGroup]="loginForm" (ngSubmit)="submit()">

  <app-form-input name="username" placeholder="Username"></app-form-input>

<app-form-input
  name="password" 
  type="password"
  placeholder="password"
  label="Mot de passe"
></app-form-input>
  <app-button type="submit" [loading]="loading">
    Login
  </app-button>

</form>

    <div class="login-footer">
      <small>Forgot password? <a routerLink="/reset-password">Reset</a></small>
    </div>
  </div>
</div>
