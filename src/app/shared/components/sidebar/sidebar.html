<aside class="sidebar">
  <div class="brand">
    <span class="brand-mark">IS</span>
    <div>
      <strong>{{ title }}</strong>
      <small>ISAM engineering</small>
    </div>
  </div>

  <nav class="nav">
    <a
      *ngFor="let item of items"
      class="nav-link"
      [routerLink]="item.route"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: false }"
    >
      {{ item.label }}
    </a>
  </nav>
</aside>
