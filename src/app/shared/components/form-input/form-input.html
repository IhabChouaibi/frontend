<div class="form-group">
  <label *ngIf="label" class="form-label">{{ label }}</label>
  <input
    [attr.name]="name || null"
    [type]="type"
    [placeholder]="placeholder"
    class="form-control"
    [value]="value"
    [disabled]="disabled"
    (input)="onInput($event)"
    (blur)="onBlur()"
  >
</div>
