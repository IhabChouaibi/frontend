<nav class="navbar">
  <div class="logo">
    <span class="logo-mark">IS</span>
    <div>
      <strong>ISAM HRMS</strong>
      <small>Workspace</small>
    </div>
  </div>

  <div class="navbar-actions" *ngIf="username; else publicState">
    <div class="user-info">
      <span class="user-meta">{{ role || 'Workspace' }}</span>
      <strong>{{ username }}</strong>
    </div>
    <button (click)="logout()" class="logout-btn">Logout</button>
  </div>

  <ng-template #publicState>
    <div class="public-state">
      <span>Human Resource Management System</span>
    </div>
  </ng-template>
</nav>
